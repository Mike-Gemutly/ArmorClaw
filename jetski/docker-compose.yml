version: '3.8'

services:
  jetski:
    build: .
    image: armorclaw/jetski:latest
    container_name: jetski_browser
    ports:
      - "9222:9222"  # CDP WebSocket
      - "8080:8080"  # RPC API (future)
    environment:
      - JETSKI_PROXY_LIST=${JETSKI_PROXY_LIST:-}
      - JETSKI_PASSPHRASE=${JETSKI_PASSPHRASE:-default-passphrase-change-me}
    volumes:
      - ./sessions:/root/.jetski/sessions
    deploy:
      resources:
        limits:
          memory: 150M
    restart: unless-stopped
