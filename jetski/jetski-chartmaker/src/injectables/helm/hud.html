<div id="jetski-helm">
  <div id="helm-header">
    <span class="helm-title">🧭 The Helm</span>
    <button id="helm-close">×</button>
  </div>
  
  <div id="helm-content">
    <div id="helm-mode">
      <button class="mode-btn active" data-mode="click">Record Click</button>
      <button class="mode-btn" data-mode="input">Record Input</button>
      <button class="mode-btn" data-mode="assert">Add Assertion</button>
    </div>
    
    <div id="helm-status">Ready to chart...</div>
    
    <div id="helm-actions">
      <button id="helm-save">💾 Save Nav-Chart</button>
      <button id="helm-clear">Clear</button>
    </div>

    <div id="helm-recorded-count">Actions: 0</div>
  </div>
</div>
