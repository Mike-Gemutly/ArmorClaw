<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub-like Test Page</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      background-color: #0d1117;
      color: #c9d1d9;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0;
      border-bottom: 1px solid #30363d;
    }
    .repo-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 20px 0;
    }
    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background-color: #1f6feb;
    }
    .repo-info h1 {
      font-size: 20px;
      margin: 0;
      color: #c9d1d9;
    }
    .repo-info p {
      margin: 4px 0 0;
      color: #8b949e;
      font-size: 14px;
    }
    .tabs {
      display: flex;
      gap: 8px;
      padding: 16px 0;
      border-bottom: 1px solid #30363d;
    }
    .tab-item {
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      color: #c9d1d9;
      text-decoration: none;
      font-size: 14px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .tab-item:hover {
      background-color: #21262d;
    }
    .tab-item.active {
      background-color: #1f6feb;
      color: #ffffff;
    }
    .tab-count {
      background-color: #30363d;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 12px;
    }
    .file-list {
      margin-top: 20px;
    }
    .file-item {
      display: flex;
      align-items: center;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      margin: 2px 0;
    }
    .file-item:hover {
      background-color: #161b22;
    }
    .file-icon {
      margin-right: 8px;
      font-size: 16px;
    }
    .file-name {
      flex: 1;
    }
    .file-message {
      margin-left: 20px;
      color: #8b949e;
      font-size: 14px;
    }
    .file-time {
      margin-left: 20px;
      color: #8b949e;
      font-size: 12px;
    }
    .button {
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid #30363d;
      background-color: #21262d;
      color: #c9d1d9;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }
    .button:hover {
      background-color: #30363d;
    }
    .button.primary {
      background-color: #238636;
      border-color: rgba(240, 246, 252, 0.1);
      color: #ffffff;
    }
    .button.primary:hover {
      background-color: #2ea043;
    }
  </style>
</head>
<body>
  <header class="header">
    <nav>
      <a href="#" class="tab-item active">Overview</a>
      <a href="#" class="tab-item">Repositories</a>
      <a href="#" class="tab-item">Projects</a>
      <a href="#" class="tab-item">Stars</a>
    </nav>
    <button class="button">Sign in</button>
  </header>

  <div class="repo-header">
    <div class="avatar"></div>
    <div class="repo-info">
      <h1>test-repository</h1>
      <p>A test repository for Jetski Chartmaker</p>
    </div>
    <div>
      <button class="button primary" id="fork-button">Fork</button>
      <button class="button" id="star-button">Star</button>
    </div>
  </div>

  <div class="tabs">
    <a href="#" class="tab-item active">
      <svg aria-hidden="true" height="16" viewBox="0 0 16 16" version="1.1" width="16" data-view-component="true">
        <path fill="#c9d1d9" d="M2 2.5A2.5 2.5 0 0 1 4.5 0h8.75a.75.75 0 0 1 .75.75v12.5a.75.75 0 0 1-.75.75h-2.5a.75.75 0 1 1 0-1.5h1.75v-2h-8a1 1 0 0 0-.714 1.7.75.75 0 0 1-1.072 1.05A2.495 2.495 0 0 1 2 11.5v-9zm10.5-1V9h-8c-.356 0-.694.074-1 .208V2.5a1 1 0 0 1 1-1h8zM5 12.25v3.25a.25.25 0 0 0 .4.2l1.45-1.087a.25.25 0 0 1 .3 0L8.6 15.7a.25.25 0 0 0 .4-.2v-3.25a.25.25 0 0 0-.25-.25h-3.5a.25.25 0 0 0-.25.25z"></path>
      </svg>
      Code
      <span class="tab-count">12</span>
    </a>
    <a href="#" class="tab-item">
      Issues
      <span class="tab-count">3</span>
    </a>
    <a href="#" class="tab-item">
      Pull requests
      <span class="tab-count">1</span>
    </a>
    <a href="#" class="tab-item">
      Actions
    </a>
  </div>

  <div class="file-list">
    <div class="file-item" data-automation-id="file-readme">
      <span class="file-icon">📄</span>
      <span class="file-name">README.md</span>
      <span class="file-message">Initial commit</span>
      <span class="file-time">2 hours ago</span>
    </div>
    <div class="file-item" data-automation-id="file-index">
      <span class="file-icon">📄</span>
      <span class="file-name">index.html</span>
      <span class="file-message">Add index page</span>
      <span class="file-time">3 hours ago</span>
    </div>
    <div class="file-item" data-automation-id="file-style">
      <span class="file-icon">📄</span>
      <span class="file-name">style.css</span>
      <span class="file-message">Update styling</span>
      <span class="file-time">5 hours ago</span>
    </div>
    <div class="file-item" data-automation-id="file-script">
      <span class="file-icon">📄</span>
      <span class="file-name">script.js</span>
      <span class="file-message">Add JavaScript</span>
      <span class="file-time">6 hours ago</span>
    </div>
  </div>

  <script>
    document.querySelectorAll('.tab-item').forEach(tab => {
      tab.addEventListener('click', function(e) {
        e.preventDefault();
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
      });
    });

    document.getElementById('fork-button').addEventListener('click', function() {
      console.log('Fork clicked');
      this.textContent = 'Forking...';
      setTimeout(() => {
        this.textContent = 'Forked';
      }, 1000);
    });

    document.getElementById('star-button').addEventListener('click', function() {
      console.log('Star clicked');
      const isStarred = this.classList.contains('starred');
      this.classList.toggle('starred');
      this.textContent = isStarred ? 'Star' : 'Starred';
    });

    document.querySelectorAll('.file-item').forEach(file => {
      file.addEventListener('click', function() {
        const fileName = this.querySelector('.file-name').textContent;
        console.log('File clicked:', fileName);
      });
    });
  </script>
</body>
</html>
