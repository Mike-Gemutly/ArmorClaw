# Docker Compose: ArmorClaw Complete Stack
# All-in-one deployment for ArmorClaw with Matrix
# Launch container and immediately connect via Element X

services:
  # ========================================
  # Matrix Conduit Homeserver
  # ========================================
  matrix:
    image: matrixconduit/matrix-conduit:latest
    container_name: armorclaw-matrix
    restart: unless-stopped
    volumes:
      - conduit_data:/var/lib/conduit
      - ./configs/conduit.toml:/etc/conduit.toml:ro
    environment:
      - CONDUIT_CONFIG=/etc/conduit.toml
    ports:
      - "6167:6167"   # Client API
      - "8448:8448"   # Federation
    networks:
      - armorclaw-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:6167/_matrix/client/versions || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 400M
        reservations:
          memory: 50M

  # ========================================
  # Sygnal Push Gateway (Matrix Push Notifications)
  # ========================================
  sygnal:
    image: matrixdotorg/sygnal:latest
    container_name: armorclaw-sygnal
    restart: unless-stopped
    volumes:
      - sygnal_data:/data
      - ./configs/sygnal.yaml:/etc/sygnal/sygnal.yaml:ro
    ports:
      - "5000:5000"   # Push Gateway API
    networks:
      - armorclaw-net
    depends_on:
      - matrix
    environment:
      - SYGNAL_CONFIG=/etc/sygnal/sygnal.yaml
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 200M
        reservations:
          memory: 50M

  # ========================================
  # Caddy Reverse Proxy (with automatic SSL)
  # ========================================
  caddy:
    image: caddy:2-alpine
    container_name: armorclaw-caddy
    restart: unless-stopped
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - armorclaw-net
    depends_on:
      - matrix
      - sygnal
    environment:
      - MATRIX_DOMAIN=${MATRIX_DOMAIN:-matrix.localhost}
      - PUSH_DOMAIN=${PUSH_DOMAIN:-push.armorclaw.app}
      - ACME_AGREE=true
    deploy:
      resources:
        limits:
          memory: 100M
        reservations:
          memory: 20M

  # ========================================
  # ArmorClaw Bridge (Containerized)
  # ========================================
  bridge:
    image: armorclaw/bridge:0.3.1
    container_name: armorclaw-bridge
    restart: unless-stopped
    volumes:
      - bridge_data:/etc/armorclaw
      - bridge_run:/run/armorclaw
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - armorclaw-net
    depends_on:
      - matrix
      - sygnal
    environment:
      - ARMORCLAW_CONFIG=/etc/armorclaw/config.toml
      - ARMORCLAW_MATRIX_ENABLED=${ARMORCLAW_MATRIX_ENABLED:-true}
      - ARMORCLAW_MATRIX_HOMESERVER_URL=http://matrix:6167
      - ARMORCLAW_MATRIX_USERNAME=${MATRIX_BRIDGE_USER:-bridge}
      - ARMORCLAW_MATRIX_PASSWORD=${MATRIX_BRIDGE_PASSWORD:-bridgepass}
      - ARMORCLAW_PUSH_GATEWAY_URL=http://sygnal:5000/_matrix/push/v1/notify
      - ARMORCLAW_API_KEY=${ARMORCLAW_API_KEY:-}
    deploy:
      resources:
        limits:
          memory: 100M
        reservations:
          memory: 30M
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID

# ========================================
# Networks
# ========================================
networks:
  armorclaw-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ========================================
# Volumes
# ========================================
volumes:
  conduit_data:
    driver: local
  sygnal_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
  bridge_data:
    driver: local
  bridge_run:
    driver: local
