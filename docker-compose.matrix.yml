# Docker Compose: Matrix Support Services
# Part of Topology Separation (G-06)
#
# This stack runs support services for Matrix (Coturn, Nginx).
# Conduit homeserver is started directly via 'docker run' with shared
# network namespace to the armorclaw container (see container-setup.sh).
#
# Usage:
#   docker-compose -f docker-compose.matrix.yml up -d

services:
  # ========================================
  # Coturn STUN/TURN Server (Voice/Video)
  # ========================================
  coturn:
    image: coturn/coturn:latest
    container_name: armorclaw-coturn
    restart: unless-stopped

    network_mode: "host"  # Requires direct network access for TURN

    environment:
      - MATRIX_SERVER_NAME=${MATRIX_SERVER_NAME:-matrix.armorclaw.com}
      # TURN_SECRET is auto-generated by container-setup.sh if not provided
      # For manual deployments, set TURN_SECRET in .env or generate with: openssl rand -hex 32
      - TURN_SECRET=${TURN_SECRET:-}
      - COTURN_EXTERNAL_IP=${COTURN_EXTERNAL_IP:-}

    volumes:
      - ${ARMORCLAW_CONFIGS:-./configs}/turnserver.conf:/etc/coturn/turnserver.conf:ro
      - coturn_data:/var/lib/coturn

     # Use shell form so environment variables and commands are expanded
    entrypoint: /bin/sh
    command:
      - -c
      - |
        # Prefer IPv4, fallback to IPv6 with warning
        if [ -z "${COTURN_EXTERNAL_IP}" ]; then
          echo "Detecting public IP..."
          EXTERNAL_IP=$(curl -s -4 https://api.ipify.org 2>/dev/null || echo '0.0.0.0')
          if echo "$EXTERNAL_IP" | grep -q ':'; then
            echo "Warning: Detected IPv6 address, prefer IPv4 but using IPv6 fallback" >&2
          fi
        else
          EXTERNAL_IP="${COTURN_EXTERNAL_IP}"
        fi
        exec turnserver \
          --log-file=stdout \
          -n \
          --no-cli \
          --realm=${MATRIX_SERVER_NAME:-matrix.armorclaw.com} \
          --use-auth-secret \
          --static-auth-secret=${TURN_SECRET:-change-me-in-production} \
          --external-ip=$EXTERNAL_IP

    deploy:
      resources:
        limits:
          memory: 100M
        reservations:
          memory: 30M

    healthcheck:
      test: ["CMD", "nc", "-z", "-u", "localhost", "3478"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ========================================
  # Nginx Reverse Proxy (Matrix Frontend)
  # ========================================
  nginx:
    # Nginx requires a build context and config files on the HOST filesystem.
    # Use 'docker compose --profile frontend up' to include it.
    profiles: ["frontend"]
    build:
      context: ./deploy/nginx
      dockerfile: Dockerfile
    image: armorclaw/nginx:latest
    container_name: armorclaw-nginx
    restart: unless-stopped

    environment:
      - MATRIX_SERVER_NAME=${MATRIX_SERVER_NAME:-matrix.armorclaw.com}
      - TURN_SERVER_NAME=${TURN_SERVER_NAME:-turn.matrix.armorclaw.com}

    volumes:
      - ${ARMORCLAW_CONFIGS:-./configs}/nginx.conf.template:/etc/nginx/nginx.conf.template:ro
      - ${ARMORCLAW_CONFIGS:-./configs}/nginx/ssl:/etc/nginx/ssl:ro
      - letsencrypt:/etc/letsencrypt:ro

    ports:
      - "80:80"
      - "443:443"

    networks:
      - matrix-net

    deploy:
      resources:
        limits:
          memory: 80M
        reservations:
          memory: 20M

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

# ========================================
# Networks
# ========================================
networks:
  matrix-net:
    driver: bridge
    name: armorclaw-matrix
    ipam:
      config:
        - subnet: 172.26.0.0/24

# ========================================
# Volumes
# ========================================
volumes:
  letsencrypt:
    driver: local
    name: armorclaw-letsencrypt
  coturn_data:
    driver: local
    name: armorclaw-coturn-data
