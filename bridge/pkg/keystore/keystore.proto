syntax = "proto3";

package armorclaw.keystore.v1;

option go_package = "github.com/armorclaw/bridge/pkg/keystore/proto;keystore";

// KeystoreService provides secure credential storage and retrieval via gRPC.
//
// This service acts as a proxy to the SQLCipher keystore in Go Bridge,
// allowing Rust Vault to access credentials without direct database access.
//
// Authentication:
// - All requests must include ephemeral token metadata
// - Tokens are validated via HMAC-SHA256 signature
// - Token TTL is 30 minutes (configured in Go Bridge)
//
// Security:
// - All credential values are encrypted at rest with SQLCipher
// - Credentials are never returned in plaintext to unauthorized callers
// - All operations are logged to audit database
service KeystoreService {
    // Retrieve a credential by ID
    //
    // The credential value is decrypted and returned in the response.
    // If the credential is expired, ErrKeyExpired is returned.
    //
    // Errors:
    //   - NOT_FOUND: Credential ID does not exist
    //   - PERMISSION_DENIED: Caller not authorized for this credential
    //   - UNAUTHENTICATED: Invalid or missing ephemeral token
    rpc RetrieveCredential(RetrieveCredentialRequest) returns (RetrieveCredentialResponse);

    // List all credentials with optional provider filter
    //
    // Returns metadata for all credentials (values not included).
    // Useful for discovering available credentials by provider.
    //
    // Errors:
    //   - UNAUTHENTICATED: Invalid or missing ephemeral token
    rpc ListCredentials(ListCredentialsRequest) returns (ListCredentialsResponse);

    // Store or update a credential
    //
    // The credential value is encrypted before storage.
    // If the ID exists, it is replaced; otherwise, a new credential is created.
    //
    // Errors:
    //   - INVALID_ARGUMENT: Invalid credential format or provider
    //   - UNAUTHENTICATED: Invalid or missing ephemeral token
    rpc StoreCredential(StoreCredentialRequest) returns (StoreCredentialResponse);

    // Delete a credential by ID
    //
    // Errors:
    //   - NOT_FOUND: Credential ID does not exist
    //   - UNAUTHENTICATED: Invalid or missing ephemeral token
    rpc DeleteCredential(DeleteCredentialRequest) returns (DeleteCredentialResponse);

    // Retrieve a user profile for BlindFill™
    //
    // Returns encrypted profile data for PII injection.
    // Used by CDP interceptor to resolve placeholder values.
    //
    // Errors:
    //   - NOT_FOUND: Profile ID does not exist
    //   - PERMISSION_DENIED: Caller not authorized for this profile
    //   - UNAUTHENTICATED: Invalid or missing ephemeral token
    rpc RetrieveProfile(RetrieveProfileRequest) returns (RetrieveProfileResponse);

    // List all user profiles with optional type filter
    //
    // Returns metadata for all profiles (data not included).
    //
    // Errors:
    //   - UNAUTHENTICATED: Invalid or missing ephemeral token
    rpc ListProfiles(ListProfilesRequest) returns (ListProfilesResponse);

    // Store or update a user profile
    //
    // Profile data is encrypted before storage.
    // Used by admin UI to create/update PII profiles.
    //
    // Errors:
    //   - INVALID_ARGUMENT: Invalid profile format
    //   - UNAUTHENTICATED: Invalid or missing ephemeral token
    rpc StoreProfile(StoreProfileRequest) returns (StoreProfileResponse);

    // Delete a user profile by ID
    //
    // Errors:
    //   - NOT_FOUND: Profile ID does not exist
    //   - UNAUTHENTICATED: Invalid or missing ephemeral token
    rpc DeleteProfile(DeleteProfileRequest) returns (DeleteProfileResponse);

    // Health check for keystore service
    //
    // Returns service status and basic metrics.
    // Does not require authentication.
    rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}

// Authentication metadata (included in all requests except HealthCheck)
message RequestMetadata {
    string request_id = 1;           // Unique request identifier for tracing
    string ephemeral_token = 2;       // HMAC-SHA256 signed token (30 min TTL)
    int64 timestamp_unix = 3;         // Request timestamp (seconds since epoch)
    string operation_signature = 4;    // Operation-specific signature (optional)
}

// Credential retrieval request
message RetrieveCredentialRequest {
    RequestMetadata metadata = 1;
    string credential_id = 2;          // Unique credential identifier
}

// Credential retrieval response
message RetrieveCredentialResponse {
    Credential credential = 1;
}

// Credential list request
message ListCredentialsRequest {
    RequestMetadata metadata = 1;
    string provider = 2;               // Filter by provider (optional, empty = all)
}

// Credential list response
message ListCredentialsResponse {
    repeated CredentialInfo credentials = 1;
}

// Credential storage request
message StoreCredentialRequest {
    RequestMetadata metadata = 1;
    Credential credential = 2;
}

// Credential storage response
message StoreCredentialResponse {
    bool success = 1;
    string message = 2;
}

// Credential deletion request
message DeleteCredentialRequest {
    RequestMetadata metadata = 1;
    string credential_id = 2;
}

// Credential deletion response
message DeleteCredentialResponse {
    bool success = 1;
    string message = 2;
}

// Profile retrieval request
message RetrieveProfileRequest {
    RequestMetadata metadata = 1;
    string profile_id = 2;           // Unique profile identifier
}

// Profile retrieval response
message RetrieveProfileResponse {
    Profile profile = 1;
}

// Profile list request
message ListProfilesRequest {
    RequestMetadata metadata = 1;
    string profile_type = 2;          // Filter by type (optional, empty = all)
}

// Profile list response
message ListProfilesResponse {
    repeated ProfileInfo profiles = 1;
}

// Profile storage request
message StoreProfileRequest {
    RequestMetadata metadata = 1;
    Profile profile = 2;
}

// Profile storage response
message StoreProfileResponse {
    bool success = 1;
    string message = 2;
}

// Profile deletion request
message DeleteProfileRequest {
    RequestMetadata metadata = 1;
    string profile_id = 2;
}

// Profile deletion response
message DeleteProfileResponse {
    bool success = 1;
    string message = 2;
}

// Health check request
message HealthCheckRequest {}

// Health check response
message HealthCheckResponse {
    string status = 1;                // "healthy", "degraded", or "unhealthy"
    int64 uptime_seconds = 2;
    int32 active_connections = 3;
    int64 credentials_stored = 4;
    int64 profiles_stored = 5;
    string version = 6;
}

// Credential (full with decrypted value)
message Credential {
    string id = 1;                   // Unique identifier
    string provider = 2;              // AI service provider (openai, anthropic, etc.)
    string token = 3;                 // Decrypted API token (only in RetrieveCredential)
    string base_url = 4;              // Custom API base URL (optional)
    string display_name = 5;           // Human-readable name
    int64 created_at = 6;             // Creation timestamp (Unix seconds)
    int64 expires_at = 7;             // Expiration timestamp (0 = never)
    repeated string tags = 8;          // Optional tags for categorization
}

// Credential metadata (value not included)
message CredentialInfo {
    string id = 1;
    string provider = 2;
    string base_url = 3;
    string display_name = 5;
    int64 created_at = 6;
    int64 expires_at = 7;
    repeated string tags = 8;
}

// Profile (full with decrypted data)
message Profile {
    string id = 1;                   // Unique identifier
    string profile_name = 2;          // Human-readable name
    string profile_type = 3;          // Type (e.g., "payment", "identity", "shipping")
    bytes data = 4;                   // Decrypted profile data (JSON)
    string field_schema = 5;           // Schema definition (JSON)
    int64 created_at = 6;
    int64 updated_at = 7;
    int64 last_accessed = 8;          // Last access timestamp (0 = never)
    bool is_default = 9;              // Default profile for this type
}

// Profile metadata (data not included)
message ProfileInfo {
    string id = 1;
    string profile_name = 2;
    string profile_type = 3;
    string field_schema = 5;
    int64 created_at = 6;
    int64 updated_at = 7;
    int64 last_accessed = 8;
    bool is_default = 9;
}
