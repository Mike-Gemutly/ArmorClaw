# Self-Hosted Appliance — Single VPS / Home Server
# No public domain, no Let's Encrypt, no Cloudflare
# mDNS discovery via avahi socket mount
#
# Topology:
#   ┌───────────────────────────────────────────────────────────────┐
#   │                        HOST MACHINE                            │
#   │  ┌─────────────────────┐                                       │
#   │  │  ArmorClaw Bridge   │ ← network_mode: host (mDNS required)  │
#   │  │  (0.0.0.0:8080)     │ ← /run/armorclaw/email-ingest.sock    │
#   │  └──────────┬──────────┘                                       │
#   │             │                                                  │
#   │  ┌──────────▼──────────────────────────────────────────────┐   │
#   │  │              armorclaw-net (172.27.0.0/24)              │   │
#   │  │  ┌─────────────┐  ┌─────────────┐  ┌─────────────┐     │   │
#   │  │  │   Matrix    │  │    Caddy    │  │  OpenClaw    │     │   │
#   │  │  │  (Conduit)  │  │  (TLS/proxy)│  │  (Agent GW)  │     │   │
#   │  │  └─────────────┘  └─────────────┘  └─────────────┘     │   │
#   │  └────────────────────────────────────────────────────────┘   │
#   └───────────────────────────────────────────────────────────────┘

services:
  # ========================================
  # ArmorClaw Bridge (host networking for mDNS)
  # ========================================
  bridge:
    image: mikegemut/armorclaw:latest
    container_name: armorclaw-bridge
    restart: unless-stopped
    network_mode: host  # Required for mDNS discovery
    environment:
      - ARMORCLAW_SERVER_MODE=native
      - ARMORCLAW_RPC_TRANSPORT=tcp
      - ARMORCLAW_LISTEN_ADDR=0.0.0.0:8080
      - ARMORCLAW_HOSTNAME=${ARMORCLAW_HOSTNAME:-armorclaw.local}
      - AI_API_KEY=${AI_API_KEY}
      - AI_PROVIDER=${AI_PROVIDER:-openrouter}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/armorclaw/data:/data
      - /run/armorclaw:/run/armorclaw
      # Avahi socket for mDNS discovery from bridge
      - /var/run/avahi-daemon/socket:/var/run/avahi-daemon/socket:ro
    healthcheck:
      test: ["CMD", "test", "-S", "/run/armorclaw/email-ingest.sock"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 128M

  # ========================================
  # Matrix Conduit Homeserver
  # ========================================
  # NOT using network_mode: host — only bridge needs it for mDNS
  matrix:
    image: matrixconduit/matrix-conduit:latest
    container_name: armorclaw-matrix
    restart: unless-stopped
    volumes:
      - matrix-data:/var/lib/matrix-conduit
    environment:
      - CONDUIT_SERVER_NAME=${ARMORCLAW_HOSTNAME:-armorclaw.local}
      - CONDUIT_DATABASE_BACKEND=rocksdb
      - CONDUIT_ALLOW_REGISTRATION=false
      - CONDUIT_ADDRESS=0.0.0.0
      - CONDUIT_PORT=6167
    networks:
      - armorclaw-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:6167/_matrix/client/versions || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 50M

  # ========================================
  # Caddy Reverse Proxy (self-signed TLS)
  # ========================================
  caddy:
    image: caddy:2-alpine
    container_name: armorclaw-caddy
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./configs/Caddyfile.selfhosted:/etc/caddy/Caddyfile:ro
      - /etc/armorclaw/certs:/etc/armorclaw/certs:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - armorclaw-net
    depends_on:
      matrix:
        condition: service_healthy
    environment:
      - ARMORCLAW_HOSTNAME=${ARMORCLAW_HOSTNAME:-armorclaw.local}
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 20M

  # ========================================
  # OpenClaw Agent Gateway (default — no profile gate)
  # ========================================
  # IMPORTANT: This is a DEFAULT service (NOT behind a profile).
  # Agents run immediately on startup.
  #
  # Both mDNS service types must remain:
  #   _armorclaw._tcp     (Go Bridge — bridge/pkg/discovery/mdns.go)
  #   _openclaw-gw._tcp   (OpenClaw Gateway — container/openclaw-src/src/infra/bonjour.ts)
  openclaw:
    image: mikegemut/openclaw:latest
    container_name: armorclaw-openclaw
    restart: unless-stopped
    volumes:
      - /run/armorclaw:/run/armorclaw
      # Avahi socket for mDNS from openclaw gateway
      - /var/run/avahi-daemon/socket:/var/run/avahi-daemon/socket:ro
    networks:
      - armorclaw-net
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 64M

# ========================================
# Networks
# ========================================
networks:
  armorclaw-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.27.0.0/24

# ========================================
# Volumes
# ========================================
volumes:
  matrix-data:
    driver: local
    name: armorclaw-matrix-data
  caddy-data:
    driver: local
    name: armorclaw-caddy-data
  caddy-config:
    driver: local
    name: armorclaw-caddy-config
  bridge-data:
    driver: local
    name: armorclaw-bridge-data
  email-data:
    driver: local
    name: armorclaw-email-data
