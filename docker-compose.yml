# Docker Compose: ArmorClaw Full Stack (Meta-Composition)
# Optimized for Phase 18: TCP Network Binding & SSH Tunneling
#
# Topology Overview:
#   ┌─────────────────────────────────────────────────────────────┐
#   │                      HOST MACHINE                           │
#   │  ┌─────────────────┐                                        │
#   │  │ ArmorClaw Bridge│ ← TCP Socket (0.0.0.0:8080)            │
#   │  │ (Docker Service)│ ← Mapped to Host Port 8081             │
#   │  └────────┬────────┘                                        │
#   │           │                                                 │
#   │  ┌────────▼────────────────────────────────────────────────┐ │
#   │  │               matrix-net (172.20.0.0/24)                │ │
#   │  │  ┌─────────────┐  ┌─────────────┐  ┌─────────────┐      │ │
#   │  │  │    Nginx    │  │   Conduit   │  │    Coturn   │      │ │
#   │  │  │   (Proxy)   │  │ (Matrix HS) │  │  (TURN/STUN)│      │ │
#   │  │  └─────────────┘  └─────────────┘  └─────────────┘      │ │
#   │  └──────────────────────────────────────────────────────────┘ │
#   └─────────────────────────────────────────────────────────────┘

# Include sub-stacks for Matrix and specific Bridge adapters
include:
  - docker-compose.matrix.yml
  - docker-compose.bridge.yml

services:
  # Overriding/Defining the Core Bridge Service with Lessons Learned
  armorclaw-sentinel:
    image: mikegemut/armorclaw:latest
    container_name: armorclaw-sentinel
    restart: unless-stopped
    ports:
      - "8081:8080" # Maps local tunnel port to container RPC
    environment:
      # LESSON: Disable aggressive container isolation for SSH tunnel access
      - ARMORCLAW_CONTAINER_MODE=false
      - ARMORCLAW_RPC_TYPE=tcp
      - ARMORCLAW_RPC_ADDR=0.0.0.0:8080
      # Use your WSL/Shell Environment Variables
      - AI_API_KEY=${AI_API_KEY}
      - AI_PROVIDER=${AI_PROVIDER}
      - ARMORCLAW_TOKEN=4f8e9b2a1c7d6e5f3a0b9c8d7e6f5a4b
      - ARMORCLAW_KEYSTORE_SECRET=dmVyeXNlY3VyZWtleTMyYnl0ZXNsb25nZml4MTIzNDU=
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/armorclaw/data:/data
    # LESSON: Explicit flags to force network binding over Unix sockets
    command: 
      - --config
      - /data/config.toml
      - --socket
      - "tcp://0.0.0.0:8080"
      - --host
      - "0.0.0.0"
    networks:
      - matrix-net
      - bridge-net

networks:
  matrix-net:
    external: true
    name: armorclaw-matrix
  bridge-net:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.21.0.0/24