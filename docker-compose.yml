# Docker Compose: ArmorClaw Full Stack (Meta-Composition)
# Optimized for Phase 18: TCP Network Binding & SSH Tunneling
#
# Topology Overview:
#   в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ
#   в”Ӯ                      HOST MACHINE                           в”Ӯ
#   в”Ӯ  в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ                                        в”Ӯ
#   в”Ӯ  в”Ӯ ArmorClaw Bridgeв”Ӯ вҶҗ TCP Socket (0.0.0.0:8080)            в”Ӯ
#   в”Ӯ  в”Ӯ (Docker Service)в”Ӯ вҶҗ Mapped to Host Port 8081             в”Ӯ
#   в”Ӯ  в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ                                        в”Ӯ
#   в”Ӯ           в”Ӯ                                                 в”Ӯ
#   в”Ӯ  в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв–јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ в”Ӯ
#   в”Ӯ  в”Ӯ               matrix-net (172.20.0.0/24)                в”Ӯ в”Ӯ
#   в”Ӯ  в”Ӯ  в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ  в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ  в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ      в”Ӯ в”Ӯ
#   в”Ӯ  в”Ӯ  в”Ӯ    Nginx    в”Ӯ  в”Ӯ   Conduit   в”Ӯ  в”Ӯ    Coturn   в”Ӯ      в”Ӯ в”Ӯ
#   в”Ӯ  в”Ӯ  в”Ӯ   (Proxy)   в”Ӯ  в”Ӯ (Matrix HS) в”Ӯ  в”Ӯ  (TURN/STUN)в”Ӯ      в”Ӯ в”Ӯ
#   в”Ӯ  в”Ӯ  в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ  в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ  в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ      в”Ӯ в”Ӯ
#   в”Ӯ  в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ в”Ӯ
#   в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ
services:
  # Overriding/Defining the Core Bridge Service with Lessons Learned
  armorclaw-sentinel:
    image: mikegemut/armorclaw:latest
    container_name: armorclaw-sentinel
    restart: unless-stopped
    ports:
      - "${ARMORCLAW_BRIDGE_HOST_PORT:-8081}:${ARMORCLAW_BRIDGE_CONTAINER_PORT:-8080}"
    environment:
      # LESSON: Disable aggressive container isolation for SSH tunnel access
      - ARMORCLAW_CONTAINER_MODE=false
      - ARMORCLAW_RPC_TYPE=${ARMORCLAW_RPC_TRANSPORT:-tcp}
      - ARMORCLAW_RPC_ADDR=${ARMORCLAW_LISTEN_ADDR:-0.0.0.0:8080}
      - ARMORCLAW_SERVER_MODE=${ARMORCLAW_SERVER_MODE:-native}
      - ARMORCLAW_PUBLIC_BASE_URL=${ARMORCLAW_PUBLIC_BASE_URL:-}
      # Use your WSL/Shell Environment Variables
      - AI_API_KEY=${AI_API_KEY}
      - AI_PROVIDER=${AI_PROVIDER}
      - ARMORCLAW_TOKEN=${ARMORCLAW_ADMIN_TOKEN:?Required}
      - ARMORCLAW_KEYSTORE_SECRET=${ARMORCLAW_KEYSTORE_SECRET:?Required}
      - ARMORCLAW_MATRIX_SECRET=${ARMORCLAW_MATRIX_SECRET:?Required}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/armorclaw/data:/data
    # LESSON: Explicit flags to force network binding over Unix sockets
    command:
      - --config
      - /data/config.toml
      - --socket
      - "tcp://${ARMORCLAW_LISTEN_ADDR:-0.0.0.0:8080}"
      - --host
      - "${ARMORCLAW_HOST:-0.0.0.0}"
    networks:
      - matrix-net
      - bridge-net

  # ========================================
  # Qdrant Vector Database
  # ========================================
  # Vector database for RAG and split-storage features.
  # Internal-only вҖ” no host port exposure.
  qdrant:
    image: qdrant/qdrant:latest
    container_name: armorclaw-qdrant
    restart: unless-stopped

    # Internal ports only вҖ” NOT exposed to host
    expose:
      - "6333"  # REST API
      - "6334"  # gRPC

    volumes:
      - qdrant_data:/qdrant/storage

    networks:
      - bridge-net
      - armorclaw-vault

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ========================================
  # Caddy Reverse Proxy (Sentinel Mode Only)
  # ========================================
  # This service only starts when --profile sentinel is specified
  # It provides HTTPS termination and routing for public deployments
  caddy:
    profiles: ["sentinel"]
    image: caddy:latest
    container_name: armorclaw-caddy
    restart: unless-stopped

    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"

    volumes:
      - ${CADDY_CONFIG_PATH:-/etc/armorclaw}/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

    environment:
      - ACME_AGREE=true
      - EMAIL=${ARMORCLAW_EMAIL:-}

    networks:
      - matrix-net
      - bridge-net

    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

networks:
  bridge-net:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.21.0.0/24
  armorclaw-isolated:
    driver: bridge
    internal: true
    name: armorclaw-isolated
    ipam:
      config:
        - subnet: 172.28.0.0/16
  armorclaw-vault:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.29.0.0/24

volumes:
  caddy_data:
    driver: local
    name: armorclaw-caddy-data
  caddy_config:
    driver: local
    name: armorclaw-caddy-config
  qdrant_data:
    driver: local
    name: armorclaw-qdrant-data