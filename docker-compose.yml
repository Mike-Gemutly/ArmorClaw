# Docker Compose: ArmorClaw Full Stack (Meta-Composition)
# Optimized for Phase 18: TCP Network Binding & SSH Tunneling
#
# Topology Overview:
#   ┌─────────────────────────────────────────────────────────────┐
#   │                      HOST MACHINE                           │
#   │  ┌─────────────────┐                                        │
#   │  │ ArmorClaw Bridge│ ← TCP Socket (0.0.0.0:8080)            │
#   │  │ (Docker Service)│ ← Mapped to Host Port 8081             │
#   │  └────────┬────────┘                                        │
#   │           │                                                 │
#   │  ┌────────▼────────────────────────────────────────────────┐ │
#   │  │               matrix-net (172.26.0.0/24)                │ │
#   │  │  ┌─────────────┐  ┌─────────────┐  ┌─────────────┐      │ │
#   │  │  │    Nginx    │  │   Conduit   │  │    Coturn   │      │ │
#   │  │  │   (Proxy)   │  │ (Matrix HS) │  │  (TURN/STUN)│      │ │
#   │  │  └─────────────┘  └─────────────┘  └─────────────┘      │ │
#   │  └──────────────────────────────────────────────────────────┘ │
#   └─────────────────────────────────────────────────────────────┘
services:
  # Overriding/Defining the Core Bridge Service with Lessons Learned
  armorclaw-sentinel:
    image: mikegemut/armorclaw:latest
    container_name: armorclaw-sentinel
    restart: unless-stopped
    ports:
      - "${ARMORCLAW_BRIDGE_HOST_PORT:-8081}:${ARMORCLAW_BRIDGE_CONTAINER_PORT:-8080}"
    environment:
      # LESSON: Disable aggressive container isolation for SSH tunnel access
      - ARMORCLAW_CONTAINER_MODE=false
      - ARMORCLAW_RPC_TYPE=${ARMORCLAW_RPC_TRANSPORT:-tcp}
      - ARMORCLAW_RPC_ADDR=${ARMORCLAW_LISTEN_ADDR:-0.0.0.0:8080}
      - ARMORCLAW_SERVER_MODE=${ARMORCLAW_SERVER_MODE:-native}
      - ARMORCLAW_PUBLIC_BASE_URL=${ARMORCLAW_PUBLIC_BASE_URL:-}
      # Use your WSL/Shell Environment Variables
      - AI_API_KEY=${AI_API_KEY}
      - AI_PROVIDER=${AI_PROVIDER}
      - ARMORCLAW_TOKEN=${ARMORCLAW_ADMIN_TOKEN:?Required}
      - ARMORCLAW_KEYSTORE_SECRET=${ARMORCLAW_KEYSTORE_SECRET:?Required}
      - ARMORCLAW_MATRIX_SECRET=${ARMORCLAW_MATRIX_SECRET:?Required}
      # Vault socket path — must match vault's isolated mount point
      - ARMORCLAW_VAULT_SOCKET=/run/armorclaw/vault/keystore.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/armorclaw/data:/data
      # Broad mount — bridge orchestrator needs access to vault and sidecar sockets
      - /run/armorclaw:/run/armorclaw
    # LESSON: Explicit flags to force network binding over Unix sockets
    command:
      - --config
      - /data/config.toml
      - --socket
      - "tcp://${ARMORCLAW_LISTEN_ADDR:-0.0.0.0:8080}"
      - --host
      - "${ARMORCLAW_HOST:-0.0.0.0}"
    networks:
      - matrix-net
      - bridge-net

  # ========================================
  # Qdrant Vector Database
  # ========================================
  # Vector database for RAG and split-storage features.
  # Internal-only — no host port exposure.
  qdrant:
    image: qdrant/qdrant:latest
    container_name: armorclaw-qdrant
    restart: unless-stopped

    # Internal ports only — NOT exposed to host
    expose:
      - "6333"  # REST API
      - "6334"  # gRPC

    volumes:
      - qdrant_data:/qdrant/storage

    networks:
      - bridge-net
      - armorclaw-vault

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ========================================
  # Rust Vault Keystore (gRPC over Unix socket)
  # ========================================
  # Hardened keystore service — network_mode: none, non-root,
  # cap_drop ALL, read-only filesystem.
  #
  # Volume isolation: mounts ONLY /run/armorclaw/vault/ (not the
  # entire /run/armorclaw/ tree) so the vault cannot see bridge,
  # office-sidecar, or other service sockets.
  armorclaw-vault:
    build:
      context: ./rust-vault
      dockerfile: Dockerfile
    image: armorclaw/vault:latest
    container_name: armorclaw-vault
    user: "10001:10001"
    restart: unless-stopped
    network_mode: none
    volumes:
      - /run/armorclaw/vault:/run/armorclaw
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=0700
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "test", "-S", "/run/armorclaw/keystore.sock"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  # ========================================
  # Caddy Reverse Proxy (Sentinel Mode Only)
  # ========================================
  # This service only starts when --profile sentinel is specified
  # It provides HTTPS termination and routing for public deployments
  caddy:
    profiles: ["sentinel"]
    image: caddy:latest
    container_name: armorclaw-caddy
    restart: unless-stopped

    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"

    volumes:
      - ${CADDY_CONFIG_PATH:-/etc/armorclaw}/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

    environment:
      - ACME_AGREE=true
      - EMAIL=${ARMORCLAW_EMAIL:-}

    networks:
      - matrix-net
      - bridge-net

    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

networks:
  bridge-net:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.26.0.0/24
  armorclaw-isolated:
    driver: bridge
    internal: true
    name: armorclaw-isolated
    ipam:
      config:
        - subnet: 172.28.0.0/16
  armorclaw-vault:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.29.0.0/24

volumes:
  caddy_data:
    driver: local
    name: armorclaw-caddy-data
  caddy_config:
    driver: local
    name: armorclaw-caddy-config
  qdrant_data:
    driver: local
    name: armorclaw-qdrant-data