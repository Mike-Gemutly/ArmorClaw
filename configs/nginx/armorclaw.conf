# =============================================================================
# ArmorClaw Nginx Configuration Template
# Version: 0.3.1
# Purpose: Hardened reverse proxy with blue/green upstream support
# =============================================================================
#
# This file is a template. The installer will replace:
#   {{DOMAIN}}        - Your domain or IP
#   {{BRIDGE_PORT}}   - Base bridge port (default: 9000)
#   {{SSL_CERT}}      - Path to SSL certificate
#   {{SSL_KEY}}       - Path to SSL private key
#
# SECURITY REQUIREMENTS:
#   - Bridge MUST be bound to localhost only
#   - Rate limiting MUST be enforced
#   - Security headers MUST be present
#   - TLS 1.2+ MUST be required
# =============================================================================

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=matrix:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=registration:10m rate=1r/m;

# Connection limiting
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Blue-green upstream for ArmorClaw Bridge
# CRITICAL: Only localhost connections allowed!
upstream armorclaw_active {
    server 127.0.0.1:{{BRIDGE_PORT}};              # blue (active)
    server 127.0.0.1:{{BRIDGE_PORT_1}} backup;     # green (standby)
    keepalive 32;
}

# Upstream for Matrix Conduit
upstream matrix_backend {
    server 127.0.0.1:6167;
    keepalive 16;
}

# Upstream for Matrix Federation
upstream matrix_federation {
    server 127.0.0.1:8448;
    keepalive 8;
}

# =============================================================================
# HTTP Server - Redirect to HTTPS
# =============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name {{DOMAIN}};

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# =============================================================================
# HTTPS Server - Main Configuration
# =============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name {{DOMAIN}};

    # SSL Certificates
    ssl_certificate {{SSL_CERT}};
    ssl_certificate_key {{SSL_KEY}};

    # SSL Configuration (Mozilla Intermediate)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;

    # SSL Session Settings
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling (requires trusted certificate)
    # ssl_stapling on;
    # ssl_stapling_verify on;

    # =============================================================================
    # Security Headers
    # =============================================================================
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # =============================================================================
    # Connection Limits
    # =============================================================================
    limit_conn conn_limit 50;

    # =============================================================================
    # Health Check Endpoint
    # =============================================================================
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # =============================================================================
    # Bridge API - LOCALHOST ONLY!
    # CRITICAL: This endpoint must NEVER be accessible from the public internet
    # =============================================================================
    location /bridge/ {
        # SECURITY: Only localhost connections allowed
        # This is the PRIMARY security boundary for the bridge
        allow 127.0.0.1;
        deny all;

        # Rate limiting
        limit_req zone=general burst=20 nodelay;
        limit_conn conn_limit 10;

        # Proxy to blue-green upstream
        proxy_pass http://armorclaw_active/;
        proxy_http_version 1.1;

        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeouts for long-polling
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering off;

        # Security: Hide internal headers
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
    }

    # =============================================================================
    # Matrix Client API
    # =============================================================================
    location /_matrix/client {
        limit_req zone=matrix burst=50 nodelay;
        limit_conn conn_limit 20;

        # CORS headers for web clients
        add_header Access-Control-Allow-Origin '*' always;
        add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Authorization, Content-Type, X-Matrix-Device-Id, X-Matrix-User-Id' always;
        add_header Access-Control-Max-Age '86400' always;

        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin '*';
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS';
            add_header Access-Control-Allow-Headers 'Authorization, Content-Type, X-Matrix-Device-Id, X-Matrix-User-Id';
            add_header Access-Control-Max-Age '86400';
            add_header Content-Length 0;
            return 204;
        }

        proxy_pass http://matrix_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long-polling support
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    # =============================================================================
    # Matrix Federation API
    # =============================================================================
    location /_matrix/federation {
        proxy_pass http://matrix_federation;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Federation needs longer timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # =============================================================================
    # Matrix Key API (for federation)
    # =============================================================================
    location /_matrix/key {
        proxy_pass http://matrix_federation;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # =============================================================================
    # Well-Known Endpoints
    # =============================================================================

    # Matrix server discovery
    location /.well-known/matrix/server {
        default_type application/json;
        add_header Access-Control-Allow-Origin '*' always;
        return 200 '{"m.server": "{{DOMAIN}}:443"}';
    }

    # Matrix client discovery
    location /.well-known/matrix/client {
        default_type application/json;
        add_header Access-Control-Allow-Origin '*' always;
        add_header Access-Control-Allow-Methods 'GET, OPTIONS' always;
        return 200 '{
            "m.homeserver": {"base_url": "https://{{DOMAIN}}"},
            "m.identity_server": {"base_url": "https://{{DOMAIN}}"},
            "org.matrix.msc3575.proxy": {"url": "https://{{DOMAIN}}"}
        }';
    }

    # ArmorClaw app configuration
    location /.well-known/armorclaw {
        default_type application/json;
        add_header Access-Control-Allow-Origin '*' always;
        add_header Access-Control-Allow-Methods 'GET, OPTIONS' always;
        return 200 '{
            "api_url": "https://{{DOMAIN}}/bridge",
            "ws_url": "wss://{{DOMAIN}}/bridge/ws",
            "push_gateway": "https://{{DOMAIN}}/_matrix/push/v1/notify",
            "matrix_homeserver": "https://{{DOMAIN}}",
            "version": "1.0.0"
        }';
    }

    # =============================================================================
    # Push Gateway (Sygnal)
    # =============================================================================
    location /_matrix/push/ {
        limit_req zone=general burst=10 nodelay;

        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # =============================================================================
    # Default: Return 404
    # =============================================================================
    location / {
        return 404;
    }
}

# =============================================================================
# Matrix Federation Port (8448)
# Some servers may connect on port 8448 directly
# =============================================================================
server {
    listen 8443 ssl http2;
    listen [::]:8443 ssl http2;
    server_name {{DOMAIN}};

    ssl_certificate {{SSL_CERT}};
    ssl_certificate_key {{SSL_KEY}};

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:5m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=63072000" always;

    # Federation endpoints only
    location /_matrix/ {
        proxy_pass http://matrix_federation;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Well-known for federation
    location /.well-known/matrix/server {
        default_type application/json;
        return 200 '{"m.server": "{{DOMAIN}}:443"}';
    }

    location / {
        return 404;
    }
}
