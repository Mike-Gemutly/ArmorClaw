[global]
# Server name will be replaced by container-setup.sh
server_name = "armorclaw.local"

database_backend = "rocksdb"
database_path = "/var/lib/conduit"

address = "0.0.0.0"
port = 6167

max_request_size = 20000000

# Security: Registration disabled by default for production
# Use registration_shared_secret for admin bootstrap
allow_registration = false
allow_federation = true
allow_check_for_updates = true

trusted_servers = ["matrix.org"]

# registration_shared_secret will be injected at runtime during bootstrap
# Format: registration_shared_secret = "<64-char-hex-secret>"
