# Matrix Conduit Configuration
# ArmorClaw Communication Stack
#
# Conduit uses flat keys under [global]. Do NOT use nested sections
# like [global.matrix] — Conduit will silently ignore them.

[global]
# Server identification
server_name = "matrix.armorclaw.com"

# Database (embedded SQLite for minimal memory)
database_path = "/var/lib/matrix-conduit/conduit.db"
database_backend = "sqlite"

# Performance tuning
max_request_size = 10000000  # 10 MB
max_concurrent_requests = 100

# Address to listen on
address = "0.0.0.0"
port = 6167

# Logging
log = "info"

# SECURITY: Keep registration DISABLED. Use deploy/create-matrix-admin.sh to create users.
# Enabling registration creates a window of vulnerability where anyone can register.
allow_registration = false

# Shared-secret registration: The setup wizard temporarily adds this line to
# register bridge + admin users, then removes it. For manual user creation:
#   1. Uncomment and set: registration_shared_secret = "<openssl rand -hex 32>"
#   2. Restart Conduit
#   3. Run: REGISTRATION_SHARED_SECRET="<secret>" ./create-matrix-admin.sh
#   4. Remove this line and restart Conduit
# registration_shared_secret = ""

allow_encryption = true
allow_federation = true
allow_check_for_updates = true

# TURN server for WebRTC voice/video
# turn_uris = ["turn:turn.matrix.armorclaw.com:3478?transport=udp"]
# turn_secret = "set-via-env-var"
# turn_ttl = 86400

# Trusted servers (for federation)
[global.well_known]
client = "https://matrix.armorclaw.com"
server = "matrix.armorclaw.com:443"
