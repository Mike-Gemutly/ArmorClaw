# ArmorClaw Voice E2E Test Services
#
# Docker Compose configuration for running lightweight voice services
# for voice E2E testing.
#
# Usage:
#   docker-compose -f tests/docker-compose.voice.yml up -d
#   # Wait for services to become healthy
#   # Run tests: ARMORCLAW_E2E=1 go test ./bridge/pkg/voice/...
#
# Services:
#   - VAD (Voice Activity Detection) on port 8001
#   - STT (Speech-to-Text) on port 8002
#   - TTS (Text-to-Speech) on port 8003
#
# Note: These are minimal mock services for testing purposes.
# Production should use full-featured voice services.

version: '3.8'

services:
  # Voice Activity Detection Service (mock)
  vad:
    image: nginx:alpine
    container_name: armorclaw-vad-test
    restart: unless-stopped
    ports:
      - "8001:80"
    volumes:
      - ./tests/voice-services/vad.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - voice-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Speech-to-Text Service (mock)
  stt:
    image: nginx:alpine
    container_name: armorclaw-stt-test
    restart: unless-stopped
    ports:
      - "8002:80"
    volumes:
      - ./tests/voice-services/stt.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - voice-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Text-to-Speech Service (mock)
  tts:
    image: nginx:alpine
    container_name: armorclaw-tts-test
    restart: unless-stopped
    ports:
      - "8003:80"
    volumes:
      - ./tests/voice-services/tts.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - voice-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  voice-net:
    driver: bridge
