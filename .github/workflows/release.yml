name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Extract version from tag
        id: version
        run: |
          # Remove 'v' prefix (v1.0.0 -> 1.0.0)
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "name=$VERSION" >> $GITHUB_OUTPUT

          # Parse version parts
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)

          # Calculate version code (MAJOR * 10000 + MINOR * 100 + PATCH)
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          echo "code=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Run tests
        run: ./gradlew test

      - name: Build release AAB
        run: ./gradlew bundleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_FILE: armorclaw-release.keystore

      - name: Verify signing
        run: jarsigner -verify -verbose androidApp/build/outputs/bundle/release/androidApp-release.aab

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aab-${{ steps.version.outputs.name }}
          path: androidApp/build/outputs/bundle/release/androidApp-release.aab
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: ArmorChat v${{ steps.version.outputs.name }}
          files: androidApp/build/outputs/bundle/release/androidApp-release.aab
          generate_release_notes: true
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

